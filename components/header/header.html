<header>
    <h1 data-page-title="Cadent">Cadent</h1>
    <p data-page-subtitle="Your one-stop shop for all music practice needs">Your one-stop shop for all music practice needs</p>
    <div id="current-routine" class="current-routine" style="display: none;">
        <div class="progress-section">
            <div class="progress-bar-container">
                <div id="session-progress" class="progress-bar-fill"></div>
            </div>
            <div class="progress-text">
                <span id="progress-elapsed">0:00</span> / <span id="progress-total">0:00</span>
            </div>
        </div>
        <div class="routine-timer">
            <span id="session-timer">00:00:00</span>
            <button id="timer-toggle" class="timer-btn">Start</button>
            <button id="timer-end-btn" class="timer-end-btn" style="display: none;">End Session</button>
        </div>
        <div class="current-item">
            <span class="item-label">Current:</span>
            <span id="current-item-text">No item selected</span>
            <a id="current-item-link" class="current-item-link" href="#" style="display: none;">Open tool ↗</a>
            <label class="auto-switch-toggle" for="auto-switch-tool" title="Automatically open each item's tool page when its time slot starts">
                <input type="checkbox" id="auto-switch-tool">
                Auto-open tool
            </label>
            <button id="next-item" class="nav-btn">Next →</button>
        </div>
    </div>
</header>
