<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuner - Cadent</title>
    <link rel="icon" href="/images/tab-icon.png" type="icon">
    <link rel="stylesheet" href="../styles/style.css">
    <script>
        window.pageTitle = "Tuner";
        window.pageSubtitle = "Use your microphone to tune your instrument with real-time frequency feedback.";
    </script>
    <script src="../components/navbar/navbar.js"></script>
    <script src="../components/header/header.js"></script>
    <script src="../scripts/session.js"></script>
</head>
<body>
    <div class="content">
        <main>
            <section id="tuner-controls" class="metronome-controls help-host">
                <div class="tuner-meter">
                    <div class="tuner-meter-marks">
                        <span class="meter-label-flat">♭</span>
                        <span class="meter-label-center">♩</span>
                        <span class="meter-label-sharp">♯</span>
                    </div>
                    <div id="needle"></div>
                </div>
                <div class="tuner-direction" id="tuner-feedback">Microphone offline</div>
                <div class="drill-controls tuner-buttons">
                    <button id="tuner-start" class="mini-btn" title="Start" aria-label="Start tuner">▶</button>
                    <button id="tuner-pause" class="mini-btn" title="Pause" aria-label="Pause tuner" disabled>❚❚</button>
                </div>
                <div class="note-cards">
                    <div class="note-card">
                        <div class="note-label">Detected Pitch</div>
                        <div class="note-value" id="tuner-note">--</div>
                    </div>
                    <div class="note-card">
                        <div class="note-label">Cents Offset</div>
                        <div class="note-value" id="tuner-cents">--</div>
                    </div>
                </div>
                <div class="drill-status" id="tuner-freq">-- Hz</div>
                <button id="page-help" class="help-btn" title="How to use" aria-label="How to use the tuner">?</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Cadent. All rights reserved.</p>
        </footer>
    </div>

    <!-- First-visit help modal (reopens via the ? button) -->
    <div id="page-help-modal" class="session-modal" data-help-key="cadentTunerHelpSeen" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2>Using the Tuner</h2>
            <p class="modal-subtitle">Tap ▶ and play a single string or note. The needle shows how close you are — flat to the left, sharp to the right. Tune slowly until the needle sits centred and turns green.</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-confirm help-close">Got it</button>
            </div>
        </div>
    </div>

    <script src="../scripts/help.js"></script>
    <script src="../scripts/tuner.js"></script>
</body>
</html>
