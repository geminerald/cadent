<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome - Cadent</title>
    <link rel="icon" href="/images/tab-icon.png" type="icon">
    <link rel="stylesheet" href="../styles/style.css">
    <script>
        window.pageTitle = "Metronome";
        window.pageSubtitle = "Keep perfect time with our adjustable metronome.";
    </script>
    <script src="../components/navbar/navbar.js"></script>
    <script src="../components/header/header.js"></script>
    <script src="../scripts/session.js"></script>
</head>
<body>
    <main>
        <section id="metronome" class="help-host">
            <div class="metronome-controls">
                <div class="tempo-control">
                    <label>Tempo (BPM)</label>
                    <div>
                        <input type="range" id="tempo-slider" min="40" max="200" value="120" step="1">
                        <input type="number" id="tempo-number" min="40" max="200" value="120" step="1">
                    </div>
                </div>
                <div>
                    <div class="time-signature-control">
                        <label for="beats">Time Signature</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="number" id="beats" min="1" max="12" value="4" step="1" style="width: 60px;">
                            <span>/</span>
                            <input type="number" id="note-value" min="1" max="16" value="4" step="1" style="width: 60px;">
                        </div>
                    </div>
                    <div class="subdivision-control">
                        <label for="subdivision">Subdivision</label>
                        <select id="subdivision">
                            <option value="1" selected>Quarter Notes</option>
                            <option value="2">Eighth Notes</option>
                            <option value="4">Sixteenth Notes</option>
                            <option value="3">Triplets</option>
                        </select>
                        <label class="swing-toggle" for="swing">
                            <input type="checkbox" id="swing" disabled>
                            Swing
                        </label>
                    </div>
                </div>
                <div>
                    <div class="sound-control">
                        <label for="sound">Sound</label>
                        <select id="sound">
                            <option value="beep">Beep</option>
                            <option value="boop">Boop</option>
                            <option value="click">Click</option>
                            <option value="wood">Wood Block</option>
                        </select>
                    </div>
                    <div class="volume-control">
                        <label for="volume">Volume</label>
                        <input type="range" id="volume" min="0" max="100" value="80" step="1">
                        <span id="volume-display">80%</span>
                    </div>
                </div>
                <div style="display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center;">
                    <button id="start-stop" class="icon-btn" data-icon="▶">Start</button>
                    <button id="advanced-toggle">Advanced Options</button>
                </div>
                <div id="advanced-options" class="hidden">
                    <div class="tempo-ramp-control">
                        <label class="ramp-enable" for="ramp-enabled">
                            <input type="checkbox" id="ramp-enabled">
                            Tempo ramp — change tempo automatically as you play
                        </label>
                        <div class="ramp-field">
                            <label for="start-tempo">Start Tempo (BPM)</label>
                            <input type="number" id="start-tempo" min="40" max="200" value="120" step="1">
                        </div>
                        <div class="ramp-field">
                            <label for="ramp-increment">Increase by (BPM)</label>
                            <input type="number" id="ramp-increment" min="1" max="40" value="5" step="1">
                        </div>
                        <div class="ramp-field">
                            <label for="ramp-bars">Every (bars)</label>
                            <input type="number" id="ramp-bars" min="1" max="64" value="4" step="1">
                        </div>
                        <div class="ramp-field">
                            <label for="end-tempo">Until (BPM)</label>
                            <input type="number" id="end-tempo" min="40" max="200" value="160" step="1">
                        </div>
                    </div>
                </div>
            </div>
            <div class="visual-indicator">
                <div id="beat-dots" class="beat-dots"></div>
            </div>
            <button id="page-help" class="help-btn" title="How to use" aria-label="How to use the metronome">?</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Cadent. All rights reserved.</p>
    </footer>

    <!-- First-visit help modal (reopens via the ? button) -->
    <div id="page-help-modal" class="session-modal" data-help-key="cadentMetronomeHelpSeen" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2>Using the Metronome</h2>
            <p class="modal-subtitle">Set the tempo with the slider or type it in, choose a time signature and subdivision, and hit ▶. The dots track each beat, with beat 1 highlighted. Open Advanced Options to ramp the tempo automatically while you practice.</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-confirm help-close">Got it</button>
            </div>
        </div>
    </div>

    <script src="../scripts/help.js"></script>
    <script src="../scripts/metronome.js"></script>
</body>
</html>
